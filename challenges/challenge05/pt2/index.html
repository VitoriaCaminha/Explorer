<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie a sua mentoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Staatliches&display=swap" rel="stylesheet">
</head>

<body>
    <div class="formulario">
        <header>
            <h1>avalie a sua mentoria</h1>
            <p>Chegou a hora de avaliar o seu mentor. Bora lá?</p>
            <img src="image.png" alt="balão vermelho claro com 5 estrelas, sendo 3 delas preenchidas com a cor branco">
        </header>

        <h2>Informações pessoais</h2>

        <main>
            <section>
                <div class="dados">
                    <div>
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" />
                    </div>
                    <div>
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" />
                    </div>
                </div>
                <label for="email">
                    Email
                    <span>(digite um email válido)</span>
                </label>
                <input type="text" id="email" />
            </section>

            <section>
                <h3>Informações do mentor</h3>
                <label for="mentor">selecione quem foi o seu mentor</label>
                <select id="mentor">
                    <option>Valter</option>
                    <option>Denis</option>
                    <option>Jaqueline</option>
                </select>
                <label for="feedback">Feedback sobre o mentor</label>
                <textarea id="feedback"></textarea>
                <div class="checkboxArea">
                    <input type="checkbox" id="checkbox">
                    <label for="checkbox">Todas as minhas dúvidas foram esclarecidas durante a mentoria.</label>
                </div>
            </section>

            <section>
                <h3>Agendando próxima mentoria</h3>
                <div class="data">
                    <div>
                        <label for="data">
                            Data
                            <span>(DD/MM/AAA)</span>
                        </label>
                        <input onblur="(this.type='text')" onfocus="(this.type='date')" id="data" />
                    </div>
                    <div>
                        <label for="das">
                            Das
                        </label>
                        <input onfocus="(this.type='text')" onblur="(this.type='time')" id="das" />
                    </div>
                    <div>
                        <label for="ate">
                            Até
                        </label>
                        <input onfocus="(this.type='text')" onblur="(this.type='time')" id="ate" />
                    </div>
            </section>
            <button type="submit">Salvar</button>
        </main>
    </div>
</body>

</html>
