<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page">
        <header>
            <p>recentes</p>
            <h1>Trabalhos</h1>
        </header>

        <main>
            <div class="card">
                <img src="https://images.pexels.com/photos/3568520/pexels-photo-3568520.jpeg?auto=compress&cs=tinysrgb&w=1600"
                    alt="mesa preta com uma xícara de café e vários itens de tecnologia, como fones de ouvido, celular, câmera e notebook">
                <h2><span>Photo</span> camera</h2>
            </div>
            <div class="card">
                <img src="https://images.pexels.com/photos/326503/pexels-photo-326503.jpeg?auto=compress&cs=tinysrgb&w=1600"
                    alt="mesa com celular, um caderno, teclado, mouse, dois monitores e alguns itens de decoração">
                <h2><span>Design</span> App</h2>
            </div>
            <div class="card">
                <img src="https://images.pexels.com/photos/4350767/pexels-photo-4350767.jpeg?auto=compress&cs=tinysrgb&w=1600"
                    alt="mesa com cadeira contendo em cima alguns livros, um notebook, um tablet, um segundo monitor e alguns itens dentro de uma caixa">
                <h2><span>Text</span> bookstore</h2>
            </div>
            <div class="card">
                <img src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1600"
                    alt="reunião com 8 pessoas ao redor de uma mesa de madeira retangular com vários cadernos, notebooks, celulares e tablets em cima">
                <h2><span>Meeting</span> work group</h2>
            </div>
        </main>
    </div>

</body>

</html>
