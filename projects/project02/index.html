<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Treine me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Open+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="page">
      <nav>
        <a id="logo" href="#">
          <img
            src="https://storage.googleapis.com/golden-wind/explorer/description-assets/nivel-02/02/logo.svg"
            alt="Logo do treine.me"
          />
        </a>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Sobre</a></li>
          <li><a href="#">Treinar</a></li>
        </ul>
      </nav>

      <main>
        <section>
          <h1>
            Treinos
            <span>exclusivos</span>
            para você
          </h1>
          <p>
            Nós criamos treinos
            <strong>exclusivos e únicos para você.</strong>
            <br />
            Invista no seu corpo e
            <strong>tenha muito mais performance</strong>
            e qualidade de vida
          </p>

          <button>
            <img
              src="https://storage.googleapis.com/golden-wind/explorer/description-assets/nivel-02/02/whats.svg"
              alt="ícone do whatsapp"
            />
            Comece já
          </button>
        </section>

        <img
          src="https://storage.googleapis.com/golden-wind/explorer/description-assets/nivel-02/02/img.png"
          alt="desenho de uma garota pulando corda em uma academia"
        />
      </main>

      <footer>
        fale conosco no instagram
        <a href="https://instagram.com/treineme">@treineme</a>
      </footer>
    </div>

    <img
      id="balls"
      src="https://storage.googleapis.com/golden-wind/explorer/description-assets/nivel-02/02/balls.svg"
      alt="bolas pequenas no canto inferior direto da página"
    />
  </body>
</html>
